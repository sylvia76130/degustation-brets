<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Courses — Dégustation Bret's</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "react/jsx-dev-runtime": "https://esm.sh/react@18.3.1/jsx-dev-runtime",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
  }
}
</script>
<style>body{margin:0;}</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-type="module" data-presets="react">
import { useState, useEffect, useRef } from "react";
import { createRoot } from "react-dom/client";

/* ---------- Firebase (SDK compat) ---------- */

const firebaseConfig = {
  apiKey: "AIzaSyD7yse_HDyDwXX_akwVfA_ABbOMHRZdK8o",
  authDomain: "degustation-brets.firebaseapp.com",
  projectId: "degustation-brets",
  storageBucket: "degustation-brets.firebasestorage.app",
  messagingSenderId: "1069235432277",
  appId: "1:1069235432277:web:c7c9dcf75de0ed43739ddc"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ---------- Données ---------- */
/* Liste volontairement à plat et triée par ordre alphabétique : cette page
   est partagée avec les participants, donc aucun regroupement par manche
   ni référence à l'appli de jeu (ça spoilerait la dégustation). */

const FLAVORS_RAW = [
  "Ail Confit & Herbes de Provence","Tajine de Poulet aux Épices","Brie Truffe","Beurre Persillé",
  "Camembert & Truffe","BBQ Flambé au Whisky","BBQ à la Mexicaine","BBQ & Jalapeño","Sauce Barbecue",
  "Cheddar Bière","Fromage Frais & Fines Herbes","Chèvre & Piment d'Espelette","Cheddar Oignons de Roscoff","Camembert",
  "Aligot à l'Aveyronnaise","Bleu d'Auvergne AOP","Tartiflette","Cheddar Jalapeño","Pesto Mozzarella",
  "Fromage du Jura","Poivrons Grillés Chorizo","Pizza au Feu de Bois","Carbonara","Falafels à la Libanaise",
  "Aïoli","Yakitori","Carbonade Flamande","Poulet Braisé",
  "Côte de Bœuf Grillée","Bacon Grillé","Kebab","Sauce Curry","Pili Pili","Moutarde au Piment de Cayenne",
  "Sauce Pommes Frites","Petits Oignons","Beurre Salé","Cèpes","Sel & Vinaigre","Miel Moutarde",
  "Nature (l'Originale)","Nature à l'Ancienne / La Paysanne",
  "Sel de Guérande (ondulée)","La chips Bio","Rôtisserie Nature","Rôtisserie Ail Confit & Herbes de Provence",
  "Chips de Légumes","Sel de Guérande (sarrasin)","Curry Crème (sarrasin)","À la Forestière (sarrasin)",
  "Nature au Sel de Guérande (So Crack)","Tomate Olive Origan (So Crack)","Sweet & Salty (So Crack)",
  "Moutarde Pickles (So Crack)","Curry Fruité (So Crack)",
  "Nature (crêpe)","Fruits Rouges (crêpe)","Beurre Citron (crêpe)","Caramel au Beurre Salé (crêpe)",
];

// { flavor, id } trié alphabétiquement — l'id garde une référence stable en base
// mais n'est jamais affiché, donc aucun ordre/numéro n'est révélé aux joueurs.
const FLAVORS = FLAVORS_RAW
  .map((flavor, i) => ({ flavor, id: "f" + i }))
  .sort((a, b) => a.flavor.localeCompare(b.flavor, "fr"));

/* ---------- App ---------- */

function App() {
  const [items, setItems] = useState({});
  const [loading, setLoading] = useState(true);
  const saveTimers = useRef({});

  useEffect(() => {
    const unsub = db.collection("shopping").onSnapshot((snap) => {
      const data = {};
      snap.forEach((d) => { data[d.id] = d.data(); });
      setItems(data);
      setLoading(false);
    }, () => setLoading(false));
    return unsub;
  }, []);

  function updateItem(id, patch) {
    setItems((prev) => ({ ...prev, [id]: { ...prev[id], ...patch } }));
    if (saveTimers.current[id]) clearTimeout(saveTimers.current[id]);
    saveTimers.current[id] = setTimeout(() => {
      db.collection("shopping").doc(id).set({
        buyer: (items[id]?.buyer ?? "") ,
        date: (items[id]?.date ?? ""),
        ...patch,
      }, { merge: true });
    }, 400);
  }

  const total = FLAVORS.length;
  const assigned = Object.values(items).filter((v) => v?.buyer && v.buyer.trim()).length;

  return (
    <div className="min-h-screen bg-orange-50 px-4 py-6">
      <div className="max-w-lg mx-auto">
        <div className="bg-slate-900 text-orange-50 rounded-3xl p-6 shadow-xl mb-4">
          <p className="text-amber-400 text-xs font-bold uppercase tracking-widest mb-1">Avant la soirée</p>
          <h1 className="text-2xl font-extrabold mb-2">🛒 Courses à faire</h1>
          <p className="text-orange-50/60 text-sm">
            {loading ? "Chargement..." : `${assigned} / ${total} saveurs prises en charge`}
          </p>
          <div className="w-full h-1.5 bg-white/10 rounded-full mt-3 overflow-hidden">
            <div className="h-full bg-rose-500 rounded-full" style={{ width: `${total ? (assigned / total) * 100 : 0}%` }} />
          </div>
        </div>

        <div className="bg-white rounded-3xl p-5 shadow-xl mb-4">
          <div className="grid grid-cols-[1fr_auto] gap-x-2 gap-y-1 text-[10px] font-bold uppercase tracking-widest text-slate-400 px-1 mb-2">
            <span>Saveur</span>
            <span className="text-right">Acheteur · Date</span>
          </div>

          {FLAVORS.map(({ flavor, id }) => {
            const item = items[id] || {};
            const done = !!(item.buyer && item.buyer.trim());
            return (
              <div key={id} className="flex items-center gap-2 py-2 border-b border-orange-100 last:border-0">
                <span className={"flex-1 text-sm min-w-0 truncate " + (done ? "text-slate-400 line-through" : "text-slate-700")}>{flavor}</span>
                <input
                  type="text"
                  value={item.buyer || ""}
                  onChange={(e) => updateItem(id, { buyer: e.target.value })}
                  placeholder="Qui ?"
                  className="w-24 bg-orange-50 rounded-lg px-2 py-1.5 text-xs text-slate-700 outline-none focus:ring-2 focus:ring-rose-400 flex-shrink-0"
                />
                <input
                  type="date"
                  value={item.date || ""}
                  onChange={(e) => updateItem(id, { date: e.target.value })}
                  className="w-[124px] bg-orange-50 rounded-lg px-2 py-1.5 text-xs text-slate-700 outline-none focus:ring-2 focus:ring-rose-400 flex-shrink-0"
                />
              </div>
            );
          })}
        </div>

        <p className="text-center text-xs text-slate-400 mt-2">📡 Mis à jour en direct pour tout le monde.</p>
      </div>
    </div>
  );
}

createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
