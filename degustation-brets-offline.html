<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dégustation Bret's</title>
<style>
:root{--cream:#FBF3E7;--ink:#22262E;--navy:#1B3A5C;--coral:#FF6B57;--gold:#DDA63A;--line:#E3D7C2;}
*{box-sizing:border-box;}
body{margin:0;background:var(--cream);color:var(--ink);font-family:-apple-system,Segoe UI,Roboto,sans-serif;}
.wrap{max-width:420px;margin:0 auto;padding:20px 16px 50px;}
.card{background:#fff;border-radius:22px;padding:22px;box-shadow:0 6px 24px rgba(34,38,46,.08);margin-bottom:16px;}
.dark{background:var(--navy);color:var(--cream);}
.eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:700;margin:0 0 6px;}
h1{font-size:26px;margin:0 0 2px;font-weight:800;line-height:1.1;}
.accent{color:var(--coral);font-weight:800;font-size:22px;margin:0 0 18px;}
.stamp{width:64px;height:64px;border:2px solid var(--coral);color:var(--coral);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;text-align:center;line-height:1.15;transform:rotate(7deg);margin-bottom:16px;}
label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8a8470;margin-bottom:6px;}
.dark label{color:var(--gold);}
input[type=text]{width:100%;background:var(--cream);border:none;border-radius:12px;padding:13px 14px;font-size:16px;color:var(--ink);margin-bottom:16px;}
.dark input[type=text]{background:transparent;border-bottom:2px solid rgba(251,243,231,.35);border-radius:0;padding:8px 2px;color:var(--cream);}
input[type=range]{width:100%;}
textarea{width:100%;background:var(--cream);border:none;border-radius:12px;padding:10px;font-size:12px;color:var(--ink);resize:none;}
button{font-family:inherit;font-weight:700;border:none;border-radius:999px;padding:14px;font-size:15px;width:100%;cursor:pointer;}
.btn-coral{background:var(--coral);color:#fff;}
.btn-navy{background:var(--navy);color:var(--cream);}
.btn-white{background:#fff;color:var(--navy);box-shadow:0 4px 14px rgba(34,38,46,.1);}
.btn-gold{background:var(--gold);color:var(--navy);}
.row{display:flex;gap:10px;}
.muted{color:#9a9384;font-size:12px;line-height:1.5;}
.progress{height:6px;background:#eee2cc;border-radius:99px;overflow:hidden;margin-bottom:16px;}
.progress > div{height:100%;background:var(--coral);}
.center{text-align:center;}
.bignum{width:78px;height:78px;border-radius:50%;background:var(--navy);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:26px;margin:0 auto 14px;}
.pill{display:inline-block;background:var(--coral);color:#fff;font-size:11px;font-weight:700;border-radius:99px;padding:3px 10px;margin-bottom:6px;}
.linkbtn{background:none;border:none;color:#9a9384;font-size:12px;font-weight:700;padding:0;margin-bottom:10px;cursor:pointer;}
.entry-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;}
.entry-row:last-child{border-bottom:none;}
.num{width:22px;height:22px;border-radius:50%;background:var(--cream);color:var(--coral);font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:8px;}
.flex{display:flex;align-items:center;}
details{margin-bottom:8px;}
summary{font-weight:700;font-size:13px;cursor:pointer;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* ---------------- Données ---------------- */
var ROUNDS = [
  {name:"Fondamentaux & Fromagères", emoji:"🧀"},
  {name:"Viandes, Grillades & Monde", emoji:"🍖"},
  {name:"BBQ & Épicées", emoji:"🌶️"},
  {name:"Natures, Sarrasin & So Crack", emoji:"🥔"},
  {name:"Bonus sucré · Chips de crêpes", emoji:"🍓"}
];
var ROUND_SIZES = [14,14,14,13,4];

// À remplacer par les vraies corrections quand tu me les donnes.
var ANSWERS = [
"Ail Confit & Herbes de Provence","Tajine de Poulet aux Épices","Brie Truffe","Beurre Persillé",
"Camembert & Truffe","BBQ Flambé au Whisky","BBQ à la Mexicaine","BBQ & Jalapeño","Sauce Barbecue",
"Cheddar Bière","Fromage Frais & Fines Herbes","Chèvre & Piment d'Espelette","Cheddar Oignons de Roscoff","Camembert",
"Aligot à l'Aveyronnaise","Bleu d'Auvergne AOP","Tartiflette","Cheddar Jalapeño","Pesto Mozzarella",
"Fromage du Jura","Poivrons Grillés Chorizo","Pizza au Feu de Bois","Carbonara","Falafels à la Libanaise",
"Aïoli","Yakitori","Carbonade Flamande","Poulet Braisé",
"Côte de Bœuf Grillée","Bacon Grillé","Kebab","Sauce Curry","Pili Pili","Moutarde au Piment de Cayenne",
"Sauce Pommes Frites","Petits Oignons","Beurre Salé","Cèpes","Sel & Vinaigre","Miel Moutarde",
"Nature (l'Originale)","Nature à l'Ancienne / La Paysanne",
"Sel de Guérande (ondulée)","La chips Bio","Rôtisserie Nature","Rôtisserie Ail Confit & Herbes de Provence",
"Chips de Légumes","Sel de Guérande (sarrasin)","Curry Crème (sarrasin)","À la Forestière (sarrasin)",
"Nature au Sel de Guérande (So Crack)","Tomate Olive Origan (So Crack)","Sweet & Salty (So Crack)",
"Moutarde Pickles (So Crack)","Curry Fruité (So Crack)",
"Nature (crêpe)","Fruits Rouges (crêpe)","Beurre Citron (crêpe)","Caramel au Beurre Salé (crêpe)"
];
var TOTAL = ANSWERS.length;

function roundInfo(i){
  var acc=0;
  for(var r=0;r<ROUNDS.length;r++){
    var size=ROUND_SIZES[r];
    if(i<acc+size) return {r:r,name:ROUNDS[r].name,emoji:ROUNDS[r].emoji,isFirst:i===acc,start:acc,end:acc+size-1};
    acc+=size;
  }
  var last=ROUNDS.length-1;
  return {r:last,name:ROUNDS[last].name,emoji:ROUNDS[last].emoji,isFirst:false,start:acc-ROUND_SIZES[last],end:acc-1};
}
function vibe(n){ return n>=8?"😍":n>=5?"🙂":n>=3?"😐":"🤢"; }

/* ---------------- Correspondance approximative ---------------- */
var STOP=["de","la","le","du","des","aux","au","et","a","en","sur","sans","avec","les","un","une","d","l"];
function norm(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9\s]/g," "); }
function toks(s){ return norm(s).split(/\s+/).filter(function(w){return w.length>=3 && STOP.indexOf(w)===-1;}); }
function isMatch(guess, correct){
  if(!guess || !guess.trim()) return false;
  var g=toks(guess), c=toks(correct);
  for(var i=0;i<g.length;i++){ if(c.indexOf(g[i])>=0) return true; }
  return false;
}

/* ---------------- Encodage des codes joueurs ---------------- */
function b64enc(str){ return btoa(unescape(encodeURIComponent(str))); }
function b64dec(str){ return decodeURIComponent(escape(atob(str))); }
function exportCode(name, entries){
  var sparse={};
  entries.forEach(function(e,i){ if(e.touched) sparse[i]=[e.guess, e.note]; });
  return b64enc(JSON.stringify({n:name, e:sparse}));
}
function importCode(code){
  try{ return JSON.parse(b64dec(code.trim())); }catch(e){ return null; }
}

/* ---------------- État + stockage local ---------------- */
function freshEntries(){
  var arr=[]; for(var i=0;i<TOTAL;i++) arr.push({guess:"",note:5,touched:false}); return arr;
}
var state = { role:null, name:"", index:0, entries:freshEntries(), screen:"home", revealData:null, master:{} };

function load(){
  try{
    var r = localStorage.getItem("brets-role"); if(r) state.role=r;
    var p = JSON.parse(localStorage.getItem("brets-player")||"null");
    if(p){ state.name=p.name; state.index=p.index; state.entries=p.entries; state.screen=p.screen==="reveal"?"tasting":p.screen; }
    var m = JSON.parse(localStorage.getItem("brets-master")||"null");
    if(m) state.master=m;
  }catch(e){}
}
function savePlayer(){ try{ localStorage.setItem("brets-player", JSON.stringify({name:state.name,index:state.index,entries:state.entries,screen:state.screen})); }catch(e){} }
function saveMaster(){ try{ localStorage.setItem("brets-master", JSON.stringify(state.master)); }catch(e){} }
function setRole(r){ state.role=r; try{ localStorage.setItem("brets-role", r); }catch(e){} render(); }
function backToRole(){ state.role=null; try{ localStorage.removeItem("brets-role"); }catch(e){} render(); }

/* ---------------- Scoring & stats ---------------- */
function scoreOwn(entries, start, end){
  var pts=0;
  for(var i=start;i<=end;i++){ if(isMatch(entries[i].guess, ANSWERS[i])) pts++; }
  return pts;
}
function masterScore(playerObj, start, end){
  var pts=0;
  for(var i=start;i<=end;i++){
    var rec = playerObj.e && playerObj.e[i];
    if(rec && isMatch(rec[0], ANSWERS[i])) pts++;
  }
  return pts;
}
function bestChips(players, start, end){
  var out=[], acc=0;
  for(var r=0;r<ROUNDS.length;r++){
    var rStart=acc, rEnd=acc+ROUND_SIZES[r]-1; acc+=ROUND_SIZES[r];
    var lo=Math.max(rStart,start), hi=Math.min(rEnd,end);
    if(lo>hi) continue;
    var bestIdx=null, bestAvg=-1;
    for(var i=lo;i<=hi;i++){
      var sum=0,n=0;
      Object.keys(players).forEach(function(name){
        var rec = players[name].e && players[name].e[i];
        if(rec){ sum+=rec[1]; n++; }
      });
      if(n>0){ var avg=sum/n; if(avg>bestAvg){bestAvg=avg; bestIdx=i;} }
    }
    if(bestIdx!==null) out.push({round:r, index:bestIdx, avg:bestAvg});
  }
  return out;
}

/* ---------------- Copie ---------------- */
function copyText(text, btn){
  function ok(){ if(btn){ var old=btn.textContent; btn.textContent="Copié ✓"; setTimeout(function(){btn.textContent=old;},1500); } }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(ok).catch(function(){ fallbackCopy(text); ok(); });
  } else { fallbackCopy(text); ok(); }
}
function fallbackCopy(text){
  var ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta);
  ta.select(); try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta);
}

/* ---------------- Actions joueur ---------------- */
function startGame(){
  var input = document.getElementById("nameInput");
  state.name = (input.value||"Invité").trim();
  state.index=0; state.entries=freshEntries(); state.screen="tasting";
  savePlayer(); render();
}
function onGuessInput(val){ state.entries[state.index].guess = val; savePlayer(); }
function onNoteInput(val){
  state.entries[state.index].note = Number(val);
  document.getElementById("noteLabel").innerHTML = val + "/10 " + vibe(Number(val));
  savePlayer();
}
function goPrev(){ if(state.index>0){ state.index--; state.screen="tasting"; savePlayer(); render(); } }
function goNext(){
  state.entries[state.index].touched=true;
  if(state.index===TOTAL-1){ openReveal(55,58,"Fin du bonus sucré 🍓"); savePlayer(); render(); return; }
  var nextIndex=state.index+1, info=roundInfo(nextIndex);
  if(info.isFirst){
    var finished = info.r-1;
    state.index=nextIndex;
    if(finished===1){ openReveal(0,27,"Fin de la Manche 2 🧀🍖"); }
    else if(finished===3){ openReveal(28,54,"Fin de la Manche 4 🌶️🥔"); }
    else { state.screen="interlude"; }
  } else { state.index=nextIndex; }
  savePlayer(); render();
}
function openReveal(start,end,label){
  state.screen="reveal";
  state.revealData={start:start,end:end,label:label,points:scoreOwn(state.entries,start,end)};
}
function continueAfterReveal(){
  state.screen = (state.index===TOTAL-1) ? "recap" : "interlude";
  savePlayer(); render();
}
function restartPlayer(){
  state.name=""; state.index=0; state.entries=freshEntries(); state.screen="home";
  try{ localStorage.removeItem("brets-player"); }catch(e){}
  render();
}

/* ---------------- Actions master ---------------- */
function addMasterCode(){
  var ta=document.getElementById("codeInput");
  var data=importCode(ta.value);
  if(!data || !data.n){ alert("Code invalide — vérifie le copier-coller."); return; }
  state.master[data.n]={e:data.e};
  saveMaster();
  ta.value="";
  render();
}
function removeMasterPlayer(name){
  delete state.master[name]; saveMaster(); render();
}
function resetMaster(){
  if(!confirm("Effacer toutes les données du Maître du jeu ?")) return;
  state.master={}; saveMaster(); render();
}

/* ---------------- Rendu ---------------- */
function render(){
  var app=document.getElementById("app");
  if(state.role===null){ app.innerHTML = tplRole(); return; }
  if(state.role==="player"){ app.innerHTML = tplPlayer(); afterPlayerRender(); return; }
  if(state.role==="master"){ app.innerHTML = tplMaster(); return; }
}

function tplRole(){
  return '' +
  '<div class="card dark center">' +
    '<p class="eyebrow">Bret\'s Tasting Night</p>' +
    '<h1>Qui es-tu ce soir ?</h1>' +
  '</div>' +
  '<button class="btn-coral" style="margin-bottom:12px" onclick="setRole(\'player\')">🙋 Je suis joueur·euse</button>' +
  '<button class="btn-white" onclick="setRole(\'master\')">🎛️ Je suis maître du jeu</button>';
}

function tplPlayer(){
  var back = '<button class="linkbtn" onclick="backToRole()">← changer de rôle</button>';

  if(state.screen==="home"){
    return back +
    '<div class="card dark">' +
      '<p class="eyebrow">Carte d\'embarquement</p>' +
      '<h1>Pass Dégustation</h1>' +
      '<p class="accent">Chips Bret\'s</p>' +
      '<div class="stamp">59<br>SAVEURS</div>' +
      '<label>Ton prénom</label>' +
      '<input type="text" id="nameInput" placeholder="Sylvia...">' +
      '<button class="btn-coral" onclick="startGame()">Décoller ✨</button>' +
      '<p class="muted" style="margin-top:12px">Tout reste sur ce téléphone. Ferme l\'onglet si besoin, tu retomberas où tu en étais.</p>' +
    '</div>';
  }

  if(state.screen==="interlude"){
    var info=roundInfo(state.index);
    return back +
    '<div class="card center">' +
      '<div style="font-size:36px;margin-bottom:6px">🥗💧</div>' +
      '<h1 style="font-size:20px">Pause santé</h1>' +
      '<p class="muted">Eau, crudités, un peu d\'air. Reset du palais avant la suite.</p>' +
      '<div style="background:#FBF0DC;border-radius:14px;padding:12px;margin:14px 0">' +
        '<p class="eyebrow" style="margin-bottom:4px">Manche ' + (info.r+1) + '</p>' +
        '<p style="font-weight:700;margin:0">' + info.emoji + ' ' + info.name + '</p>' +
      '</div>' +
      '<button class="btn-navy" onclick="state.screen=\'tasting\';savePlayer();render();">On reprend →</button>' +
    '</div>';
  }

  if(state.screen==="tasting"){
    var i=state.index, e=state.entries[i], info=roundInfo(i);
    return back +
    '<div class="flex" style="justify-content:space-between;font-size:12px;font-weight:700;color:#8a8470;margin-bottom:6px">' +
      '<span>' + (i+1) + ' / ' + TOTAL + '</span><span>' + info.emoji + ' ' + info.name + '</span>' +
    '</div>' +
    '<div class="progress"><div style="width:' + (((i+1)/TOTAL)*100) + '%"></div></div>' +
    '<div class="card">' +
      '<div class="bignum">' + (i+1) + '</div>' +
      '<p class="center muted" style="margin-top:-6px">Chips n°' + (i+1) + ' dans le bol</p>' +
      '<label>Ta supposition de saveur</label>' +
      '<input type="text" id="guessInput" value="' + (e.guess||"").replace(/"/g,"&quot;") + '" oninput="onGuessInput(this.value)" placeholder="ex : fromage, barbecue, kebab...">' +
      '<div class="flex" style="justify-content:space-between;margin-bottom:6px">' +
        '<label style="margin:0">Note</label>' +
        '<span id="noteLabel" style="font-weight:800;font-size:17px">' + e.note + '/10 ' + vibe(e.note) + '</span>' +
      '</div>' +
      '<input type="range" min="0" max="10" step="1" value="' + e.note + '" oninput="onNoteInput(this.value)">' +
      '<p class="center muted" style="margin-top:14px">💧 pense au reset palais avant la suivante</p>' +
    '</div>' +
    '<div class="row">' +
      '<button class="btn-white" onclick="goPrev()" ' + (i===0?'disabled style="opacity:.3"':'') + '>← Précédent</button>' +
      '<button class="btn-coral" onclick="goNext()">' + (i===TOTAL-1?'Terminer':'Suivant →') + '</button>' +
    '</div>';
  }

  if(state.screen==="reveal"){
    var d=state.revealData;
    var rows="";
    for(var k=d.start;k<=d.end;k++){ rows += '<div class="entry-row"><span class="flex"><span class="num">' + (k+1) + '</span>' + ANSWERS[k] + '</span></div>'; }
    var code = exportCode(state.name, state.entries);
    return back +
    '<div class="card dark center"><p class="eyebrow">Révélations</p><h1 style="font-size:20px">' + d.label + '</h1></div>' +
    '<div class="card"><p class="eyebrow" style="color:#FF6B57">Tes points sur ce bloc</p>' +
      '<p style="font-size:30px;font-weight:800;margin:0">' + d.points + ' <span style="font-size:15px;color:#9a9384;font-weight:600">/ ' + (d.end-d.start+1) + '</span></p>' +
    '</div>' +
    '<div class="card" style="max-height:220px;overflow:auto">' +
      '<p class="eyebrow">Les bonnes réponses</p>' + rows +
    '</div>' +
    '<div class="card" style="background:#FBF0DC">' +
      '<p class="eyebrow" style="color:var(--gold)">📤 Pour le classement collectif</p>' +
      '<p class="muted">Copie ce code et envoie-le à l\'organisatrice (maître du jeu) — elle l\'utilisera pour calculer le classement de tout le monde.</p>' +
      '<textarea rows="3" readonly>' + code + '</textarea>' +
      '<button class="btn-gold" style="margin-top:10px" onclick="copyText(\'' + code + '\', this)">📋 Copier mon code</button>' +
    '</div>' +
    '<button class="btn-coral" onclick="continueAfterReveal()">' + (state.index===TOTAL-1?'Voir mon récap final →':'Continuer la dégustation →') + '</button>';
  }

  if(state.screen==="recap"){
    var lines="";
    state.entries.forEach(function(e,idx){
      lines += '<div class="entry-row"><span class="flex"><span class="num">' + (idx+1) + '</span>' + (e.guess.trim()||'<span style="color:#ccc">sans réponse</span>') + '</span><b>' + e.note + '/10</b></div>';
    });
    var fullCode = exportCode(state.name, state.entries);
    var commented = state.entries.filter(function(e){return e.guess.trim();}).length;
    return back +
    '<div class="card dark center"><p class="eyebrow">Atterrissage</p><h1 style="font-size:22px">Bravo ' + state.name + ' !</h1><p class="muted" style="color:#cfc6b3">' + commented + ' / ' + TOTAL + ' saveurs commentées</p></div>' +
    '<div class="card" style="max-height:340px;overflow:auto">' + lines + '</div>' +
    '<div class="card" style="background:#FBF0DC">' +
      '<p class="eyebrow" style="color:var(--gold)">Code final complet</p>' +
      '<textarea rows="3" readonly>' + fullCode + '</textarea>' +
      '<button class="btn-gold" style="margin-top:10px" onclick="copyText(\'' + fullCode + '\', this)">📋 Copier mon code final</button>' +
    '</div>' +
    '<button class="btn-white" style="margin-bottom:10px" onclick="restartPlayer()">🔄 Effacer et recommencer</button>';
  }
  return "";
}

function afterPlayerRender(){
  // remet le focus proprement après un re-render complet (cas tasting)
}

function tplMaster(){
  var back='<button class="linkbtn" onclick="backToRole()">← changer de rôle</button>';
  var names=Object.keys(state.master);
  var rows = names.map(function(n){
    return {name:n, points: masterScore(state.master[n], 0, TOTAL-1)};
  }).sort(function(a,b){return b.points-a.points;});

  var leaderboardHtml = rows.length===0 ? '<p class="muted">Aucun code reçu pour l\'instant.</p>' :
    rows.map(function(p,i){
      var medal = i===0?"🥇":i===1?"🥈":i===2?"🥉":(i+1)+".";
      return '<div class="entry-row"><span>' + medal + ' ' + p.name + '</span><b>' + p.points + ' pts</b></div>';
    }).join("");

  var best = bestChips(state.master, 0, TOTAL-1);
  var bestHtml = best.length===0 ? '' :
    '<div class="card" style="background:#FBF0DC"><p class="eyebrow" style="color:var(--gold)">🏅 Meilleures chips par manche</p>' +
    best.map(function(b){ return '<p style="margin:4px 0;font-size:13px">Manche ' + (b.round+1) + ' — n°' + (b.index+1) + ' ' + ANSWERS[b.index] + ' (' + b.avg.toFixed(1) + '/10)</p>'; }).join("") +
    '</div>';

  var playersList = names.length===0 ? "" :
    '<div class="card"><p class="eyebrow">Joueurs enregistrés</p>' +
    names.map(function(n){
      return '<div class="entry-row"><span>' + n + '</span><button class="linkbtn" style="color:#FF6B57" onclick="removeMasterPlayer(\'' + n + '\')">supprimer</button></div>';
    }).join("") + '</div>';

  return back +
  '<div class="card dark"><p class="eyebrow">Centre de contrôle</p><h1 style="font-size:22px">🎛️ Maître du jeu</h1></div>' +
  '<div class="card">' +
    '<p class="eyebrow">📥 Coller un code joueur</p>' +
    '<textarea id="codeInput" rows="3" placeholder="Colle ici le code reçu d\'un·e joueur·euse"></textarea>' +
    '<button class="btn-navy" style="margin-top:10px" onclick="addMasterCode()">Ajouter / mettre à jour</button>' +
  '</div>' +
  '<div class="card"><p class="eyebrow">🏆 Classement général</p>' + leaderboardHtml + '</div>' +
  bestHtml +
  playersList +
  '<button class="btn-white" onclick="resetMaster()">🧹 Réinitialiser le Maître du jeu</button>';
}

load();
render();
</script>
</body>
</html>
